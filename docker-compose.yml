version: '3.8'

services:
  web:
    image: backend:latest
    container_name: backend_container
    command: > 
      sh -c '
        python manage.py runserver 0.0.0.0:8000
      '
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  celery:
    image: backend:latest
    container_name: celery_container
    command: >
      sh -c '
        celery -A bot_backend worker -l info
      '
    env_file:
      - .env
    depends_on:
      - redis

  celery-beat:
    image: backend:latest
    container_name: celery_beat_container
    command: >
      sh -c '
        celery -A bot_backend beat -l info
      '
    env_file:
      - .env
    depends_on:
      - redis
  postgres:
    image: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
  telegram_bot:
    image: email_reader_front:latest
    container_name: telegram_bot_container
    env_file:
      - .env
  redis:
    image: redis:latest
    container_name: redis_container
    env_file:
      - .env
    ports:
      - "6379:6379"
    command: >
      sh -c '
        mkdir -p /usr/local/etc/redis &&
        echo "requirepass $REDIS_PASSWORD" >> /usr/local/etc/redis/redis.conf &&
        redis-server /usr/local/etc/redis/redis.conf
      '
    volumes:
      - db-data:/var/lib/redis/data


volumes:
  db-data: