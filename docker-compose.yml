version: '3.8'

services:
  telegram_bot:
    image: front:latest
    env_file:
      - .env
    depends_on:
      - redis
      - backend
  nginx:
    build: ./nginx
    ports:
      - 1337:80
    volumes:
      - static_volume:/usr/src/app/staticfiles
    depends_on:
      - backend
  backend:
    image: backend:latest
    command: > 
      sh -c '
        python manage.py collectstatic --clear &&
        python manage.py migrate &&
        gunicorn bot_backend.wsgi:application --bind 0.0.0.0:8000  
      '
    expose:
      - "8000"
    volumes:
      - static_volume:/usr/src/app/staticfiles
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  celery:
    image: backend:latest
    command: >
      sh -c '
        celery -A bot_backend worker -l info
      '
    env_file:
      - .env
    depends_on:
      - redis

  celery-beat:
    image: backend:latest
    command: >
      sh -c '
        celery -A bot_backend beat -l info
      '
    env_file:
      - .env
    depends_on:
      - redis
  postgres:
    image: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:latest
    env_file:
      - .env
    ports:
      - "6379:6379"
    command: >
      sh -c '
        mkdir -p /usr/local/etc/redis &&
        echo "requirepass $REDIS_PASSWORD" >> /usr/local/etc/redis/redis.conf &&
        redis-server /usr/local/etc/redis/redis.conf
      '
    volumes:
      - db-data:/var/lib/redis/data


volumes:
  db-data:
  static_volume: